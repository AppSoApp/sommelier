<svg xmlns="http://www.w3.org/2000/svg" width="440" height="140" viewBox="0 0 440 140" role="img" aria-label="sommelier">
  <title>sommelier</title>
  <defs>
    <linearGradient id="wine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9a2745"/>
      <stop offset="1" stop-color="#6d152f"/>
    </linearGradient>
  </defs>

  <!-- wine glass -->
  <g transform="translate(46 26)" fill="none" stroke="#6d152f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- bowl outline -->
    <path d="M8 4 h40 a20 20 0 0 1 -20 40 a20 20 0 0 1 -20 -40 z"/>
    <!-- wine fill -->
    <path d="M12 14 h32 a16 16 0 0 1 -16 30 a16 16 0 0 1 -16 -30 z" fill="url(#wine)" stroke="none"/>
    <!-- stem + base -->
    <path d="M28 44 v34 M14 82 h28"/>
    <!-- tasting swirl -->
    <path d="M56 6 q14 6 8 20 q-4 9 -14 8" stroke="#c9a227" stroke-width="2.5" opacity="0.9"/>
    <circle cx="49" cy="35" r="1.8" fill="#c9a227" stroke="none"/>
  </g>

  <!-- wordmark -->
  <text x="132" y="78" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="500" letter-spacing="1.5" fill="#6d152f">sommelier</text>
  <text x="134" y="102" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="12.5" letter-spacing="2.6" fill="#8a8a8a">TASTE · PAIR · VERIFY</text>
</svg>
